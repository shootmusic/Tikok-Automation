name: Facebook Auto Upload & Engagement

on:
  schedule:
    - cron: '0 23 * * *'   # Upload jam 07:00 WIB
    - cron: '0 10 * * *'   # Upload jam 17:30 WIB
    - cron: '*/30 * * * *' # Auto reply setiap 30 menit
  workflow_dispatch:

jobs:
  # ==================== JOB 1: AUTO UPLOAD ====================
  auto-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-cache-${{ runner.os }}-ffmpeg
        restore-keys: |
          apt-cache-${{ runner.os }}-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq
        pip install gdown requests

    - name: Restore used cuts
      uses: actions/cache@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
        restore-keys: |
          fb-used-cuts-

    - name: Restore posted videos history
      uses: actions/cache@v4
      with:
        path: posted_videos.txt
        key: posted-videos-history
        restore-keys: |
          posted-videos-

    - name: Restore replied comments history
      uses: actions/cache@v4
      with:
        path: replied_comments.txt
        key: replied-comments-history
        restore-keys: |
          replied-comments-

    - name: Download video from Google Drive
      run: |
        echo "📥 Downloading Vikings S1E1..."
        gdown "https://drive.google.com/uc?id=1GXi0sXcYcSe6GjGr76Y2cf9eqQyZ_MbD" -O source_video.mp4 --fuzzy --quiet
        echo "✅ Download completed"

    - name: Get video duration
      id: duration
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4 | cut -d. -f1)
        echo "duration=$DURATION" >> $GITHUB_OUTPUT
        echo "🎬 Video duration: $DURATION seconds"

    - name: Find unused cut position
      id: cut
      run: |
        DURATION=${{ steps.duration.outputs.duration }}
        MAX_START=$((DURATION - 60))
        
        touch used_cuts.txt
        USED_COUNT=$(wc -l < used_cuts.txt)
        echo "📊 Used cuts so far: $USED_COUNT"
        
        while true; do
          START_TIME=$((RANDOM % MAX_START))
          if ! grep -q "^$START_TIME$" used_cuts.txt; then
            echo "$START_TIME" >> used_cuts.txt
            break
          fi
        done
        
        START_FORMATTED=$(printf "%02d:%02d:%02d" $((START_TIME/3600)) $(((START_TIME%3600)/60)) $((START_TIME%60)))
        echo "✂️ Cutting at $START_FORMATTED (unique position)"
        
        ffmpeg -i source_video.mp4 -ss "$START_FORMATTED" -t 60 \
          -c:v libx264 -c:a aac -preset fast -y output.mp4 2>/dev/null
        
        echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
        echo "✅ Cut completed"

    - name: Extract frames for analysis
      run: |
        ffmpeg -i output.mp4 -ss 5 -vframes 1 -y frame1.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 20 -vframes 1 -y frame2.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 40 -vframes 1 -y frame3.jpg 2>/dev/null
        echo "🖼️ Frames extracted"

    - name: Generate engaging content with Gemini
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        FRAME1_B64=$(base64 -w 0 frame1.jpg)
        FRAME2_B64=$(base64 -w 0 frame2.jpg)
        FRAME3_B64=$(base64 -w 0 frame3.jpg)
        
        USED_COUNT=$(wc -l < used_cuts.txt)
        START_TIME=${{ steps.cut.outputs.start_time }}
        TIMESTAMP=$(printf "%02d:%02d" $((START_TIME/60)) $((START_TIME%60)))
        
        cat > payload.json << EOF
        {
          "contents": [{
            "parts": [
              {"text": "Analisis video pendek 60 detik dari VIKINGS Season 1 Episode 1 (segment ke-$USED_COUNT, timestamp $TIMESTAMP). Berdasarkan 3 frame:\n\nBUAT KONTEN VIRAL FACEBOOK:\n1. JUDUL: Epic, spesifik adegan, max 60 karakter, pakai ajakan LIKE & SHARE\n2. DESKRIPSI: 2-3 kalimat engaging\n3. CAPTION: Hook + emoji + 10-15 hashtag\n4. PERTANYAAN: 1 pertanyaan pancing diskusi\n\nFORMAT:\nJUDUL: ...\nDESKRIPSI: ...\nCAPTION: ...\nPERTANYAAN: ..."},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME1_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME2_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME3_B64}"}}
            ]
          }],
          "generationConfig": {"temperature": 0.95, "maxOutputTokens": 500}
        }
        EOF
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d @payload.json > caption.json
        
        FULL_TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' caption.json)
        
        TITLE=$(echo "$FULL_TEXT" | grep -i "^JUDUL:" | head -1 | sed 's/^JUDUL:\s*//i')
        DESCRIPTION=$(echo "$FULL_TEXT" | grep -i "^DESKRIPSI:" | head -1 | sed 's/^DESKRIPSI:\s*//i')
        CAPTION=$(echo "$FULL_TEXT" | grep -i "^CAPTION:" | head -1 | sed 's/^CAPTION:\s*//i')
        QUESTION=$(echo "$FULL_TEXT" | grep -i "^PERTANYAAN:" | head -1 | sed 's/^PERTANYAAN:\s*//i')
        
        if [[ -z "$TITLE" ]]; then
          TITLE="⚔️ VIKINGS - Adegan EPIC di Menit ${TIMESTAMP}! LIKE & SHARE!"
        fi
        if [[ -z "$DESCRIPTION" ]]; then
          DESCRIPTION="🔥 Aksi seru para Viking! Jangan lupa LIKE, COMMENT, SHARE!"
        fi
        if [[ -z "$CAPTION" ]]; then
          CAPTION="🔥 EPIC VIKINGS MOMENT!\n\nSaksikan aksi seru para Viking!\n\n#Vikings #VikingsSeries #Nordik #Pertempuran #SerialEpic #Drakkar #Warrior"
        fi
        if [[ -z "$QUESTION" ]]; then
          QUESTION="Menurut kalian, siapakah Viking terkuat? Tulis di komen! ⚔️🔥"
        fi
        
        FULL_CAPTION="${TITLE}\n\n${DESCRIPTION}\n\n${CAPTION}\n\n📢 ${QUESTION}\n\n👇 LIKE, COMMENT, SHARE ya! 🔥"
        
        echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        echo "FULL_CAPTION=$FULL_CAPTION" >> $GITHUB_OUTPUT
        echo "✅ Generated: $TITLE"

    - name: Upload to Facebook
      id: upload
      env:
        FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FULL_CAPTION: ${{ steps.caption.outputs.FULL_CAPTION }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import requests, os
        from datetime import datetime
        import time
        
        token = os.environ.get("FB_TOKEN", "")
        page_id = os.environ.get("FB_PAGE_ID", "")
        full_caption = os.environ.get("FULL_CAPTION", "")
        title = os.environ.get("TITLE", "")
        
        full_caption = full_caption.replace('\\n\\n', '\n\n').replace('\\n', '\n')
        
        # 1. UPLOAD VIDEO
        url = f"https://graph.facebook.com/v18.0/{page_id}/videos"
        with open("output.mp4", "rb") as video_file:
            response = requests.post(
                url,
                data={
                    "description": full_caption,
                    "title": title,
                    "access_token": token,
                    "privacy": {"value": "EVERYONE"}
                },
                files={"source": video_file},
                timeout=120
            )
        result = response.json()
        
        if "id" not in result:
            print(f"⚠️ Upload failed: {result}")
            exit(1)
        
        video_id = result['id']
        print(f"📹 Video uploaded with ID: {video_id}")
        
        # 2. TUNGGU SEBENTAR BIAR FACEBOOK PROSES
        time.sleep(3)
        
        # 3. AMBIL POST ID YANG BENAR
        post_url = f"https://graph.facebook.com/v18.0/{video_id}?fields=parent,id&access_token={token}"
        post_response = requests.get(post_url)
        post_data = post_response.json()
        
        if "parent" in post_data and "id" in post_data["parent"]:
            post_id = post_data["parent"]["id"]
            print(f"✅ Got post ID from parent: {post_id}")
        else:
            post_id = f"{page_id}_{video_id}"
            print(f"⚠️ Using fallback post ID: {post_id}")
        
        # 4. SIMPAN POST ID
        upload_date = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
        with open("post_id.txt", "w") as f:
            f.write(post_id)
        
        # 5. SIMPAN KE HISTORY
        with open("posted_videos.txt", "a") as f:
            f.write(f"{post_id}|{upload_date}\n")
        
        print(f"✅ Post ID saved: {post_id}")
        PYTHON_SCRIPT

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: post-data
        path: |
          post_id.txt
          posted_videos.txt

    - name: Save used cuts
      if: always()
      uses: actions/cache/save@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable

    - name: Save posted videos history
      if: always()
      uses: actions/cache/save@v4
      with:
        path: posted_videos.txt
        key: posted-videos-history

    - name: Save replied comments history
      if: always()
      uses: actions/cache/save@v4
      with:
        path: replied_comments.txt
        key: replied-comments-history

    - name: Send Telegram notification
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        USED_COUNT=$(wc -l < used_cuts.txt)
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="🔥 VIKINGS Upload #${USED_COUNT}\n📌 ${TITLE}\n💬 LIKE, COMMENT, SHARE!\n📊 Total: ${USED_COUNT}"


  # ==================== JOB 2: AUTO LIKE & KOMEN (PER VIDEO BARU) ====================
  auto-engagement:
    runs-on: ubuntu-latest
    needs: auto-upload
    if: always() && (github.event_name != 'schedule' || github.event.schedule == '0 23 * * *' || github.event.schedule == '0 10 * * *')
    
    steps:
    - name: Download post data
      uses: actions/download-artifact@v4
      with:
        name: post-data

    - name: Auto Like & Comment from Dummy Page
      env:
        FB_DUMMY_PAGE_TOKEN: ${{ secrets.FB_DUMMY_PAGE_TOKEN }}
      run: |
        if [ ! -f "post_id.txt" ]; then
          echo "⚠️ No post_id.txt found"
          exit 0
        fi
        
        POST_ID=$(cat post_id.txt)
        
        if [[ ! "$POST_ID" =~ ^[0-9]+_[0-9]+$ ]]; then
          echo "⚠️ Invalid post_id format: $POST_ID"
          exit 0
        fi
        
        COMMENTS=(
          "⚔️ Viking terbaik! Like from Asupan Random +62! 🔥"
          "🛡️ Ragnar would be proud! Share this! 💪"
          "🌊 Another epic moment from Vikings! Like & share!"
          "👑 Best scene ever! Who agrees? 👇"
          "🔥 More Vikings content please! Like this comment!"
        )
        
        RANDOM_INDEX=$((RANDOM % ${#COMMENTS[@]}))
        RANDOM_COMMENT="${COMMENTS[$RANDOM_INDEX]}"
        
        echo "👍 Liking post: $POST_ID"
        curl -s -X POST "https://graph.facebook.com/v18.0/${POST_ID}/likes?access_token=${FB_DUMMY_PAGE_TOKEN}" || echo "Like failed"
        
        sleep 3
        
        echo "💬 Commenting: $RANDOM_COMMENT"
        curl -s -X POST "https://graph.facebook.com/v18.0/${POST_ID}/comments" \
          -d "message=${RANDOM_COMMENT}" \
          -d "access_token=${FB_DUMMY_PAGE_TOKEN}" || echo "Comment failed"
        
        echo "✅ Auto engagement completed!"


  # ==================== JOB 3: AUTO REPLY AI (SETIAP 30 MENIT, HANYA VIDEO < 30 HARI) ====================
  auto-reply:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore posted videos history
      uses: actions/cache@v4
      with:
        path: posted_videos.txt
        key: posted-videos-history
        restore-keys: |
          posted-videos-

    - name: Restore replied comments history
      uses: actions/cache@v4
      with:
        path: replied_comments.txt
        key: replied-comments-history
        restore-keys: |
          replied-comments-

    - name: Reply to comments from recent videos (last 30 days)
      env:
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        if [ ! -f "posted_videos.txt" ]; then
          echo "⚠️ No posted videos history found"
          exit 0
        fi
        
        touch replied_comments.txt
        CURRENT_DATE=$(date +%s)
        
        while IFS='|' read -r POST_ID UPLOAD_DATE; do
          if [ -z "$POST_ID" ] || [ -z "$UPLOAD_DATE" ]; then
            continue
          fi
          
          if [[ ! "$POST_ID" =~ ^[0-9]+_[0-9]+$ ]]; then
            echo "⚠️ Invalid post_id format: $POST_ID, skipping..."
            continue
          fi
          
          UPLOAD_TIMESTAMP=$(date -d "$UPLOAD_DATE" +%s 2>/dev/null || echo 0)
          AGE_DAYS=$(( (CURRENT_DATE - UPLOAD_TIMESTAMP) / 86400 ))
          
          if [ $AGE_DAYS -ge 30 ]; then
            echo "⏭️ Skip video $POST_ID (uploaded $AGE_DAYS days ago)"
            continue
          fi
          
          echo "📝 Checking comments for video $POST_ID ($AGE_DAYS days old)"
          
          curl -s -X GET "https://graph.facebook.com/v18.0/${POST_ID}/comments?access_token=${FB_PAGE_TOKEN}&order=reverse_chronological&limit=10" > comments.json
          
          jq -c '.data[]' comments.json | while read comment; do
            COMMENT_ID=$(echo "$comment" | jq -r '.id')
            COMMENT_TEXT=$(echo "$comment" | jq -r '.message')
            
            if grep -q "^$COMMENT_ID$" replied_comments.txt; then
              continue
            fi
            
            echo "💬 New comment: $COMMENT_TEXT"
            
            REPLY=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
              -H "Content-Type: application/json" \
              -d "{
                \"contents\": [{
                  \"parts\": [{
                    \"text\": \"Balas komen Facebook ini dengan ramah, singkat (max 50 kata), engaging, dan gunakan emoji. Komen: ${COMMENT_TEXT}\"
                  }]
                }]
              }" | jq -r '.candidates[0].content.parts[0].text // ""')
            
            if [ -n "$REPLY" ] && [ "$REPLY" != "null" ]; then
              echo "🤖 Replying: $REPLY"
              curl -s -X POST "https://graph.facebook.com/v18.0/${COMMENT_ID}/comments" \
                -d "message=${REPLY}" \
                -d "access_token=${FB_PAGE_TOKEN}" > /dev/null
              echo "$COMMENT_ID" >> replied_comments.txt
              echo "✅ Replied"
              sleep 3
            fi
          done
        done < posted_videos.txt
        
    - name: Save replied comments history
      uses: actions/cache/save@v4
      with:
        path: replied_comments.txt
        key: replied-comments-history
