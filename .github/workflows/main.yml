name: Facebook Auto Upload

on:
  schedule:
    - cron: '0 12 * * *'   # 19:00 WIB
    - cron: '0 23 * * *'   # 06:00 WIB
  workflow_dispatch:

jobs:
  facebook-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq
        pip install gdown requests

    - name: Restore used cuts
      uses: actions/cache@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
        restore-keys: |
          fb-used-cuts-

    - name: Download video from Google Drive
      run: |
        echo "📥 Downloading Vikings S1E1..."
        gdown "https://drive.google.com/uc?id=1GXi0sXcYcSe6GjGr76Y2cf9eqQyZ_MbD" -O source_video.mp4 --fuzzy --quiet
        echo "✅ Download completed"

    - name: Get video duration
      id: duration
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4 | cut -d. -f1)
        echo "duration=$DURATION" >> $GITHUB_OUTPUT
        echo "🎬 Video duration: $DURATION seconds"

    - name: Find unused cut position
      id: cut
      run: |
        DURATION=${{ steps.duration.outputs.duration }}
        MAX_START=$((DURATION - 60))
        
        touch used_cuts.txt
        USED_COUNT=$(wc -l < used_cuts.txt)
        echo "📊 Used cuts so far: $USED_COUNT"
        
        while true; do
          START_TIME=$((RANDOM % MAX_START))
          if ! grep -q "^$START_TIME$" used_cuts.txt; then
            echo "$START_TIME" >> used_cuts.txt
            break
          fi
        done
        
        START_FORMATTED=$(printf "%02d:%02d:%02d" $((START_TIME/3600)) $(((START_TIME%3600)/60)) $((START_TIME%60)))
        echo "✂️ Cutting at $START_FORMATTED (unique position)"
        
        ffmpeg -i source_video.mp4 -ss "$START_FORMATTED" -t 60 \
          -c:v libx264 -c:a aac -preset fast -y output.mp4 2>/dev/null
        
        echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
        echo "✅ Cut completed"

    - name: Extract frames for analysis
      run: |
        ffmpeg -i output.mp4 -ss 5 -vframes 1 -y frame1.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 20 -vframes 1 -y frame2.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 40 -vframes 1 -y frame3.jpg 2>/dev/null
        echo "🖼️ Frames extracted"

    - name: Generate engaging content with Gemini
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        FRAME1_B64=$(base64 -w 0 frame1.jpg)
        FRAME2_B64=$(base64 -w 0 frame2.jpg)
        FRAME3_B64=$(base64 -w 0 frame3.jpg)
        
        # Hitung segment number
        USED_COUNT=$(wc -l < used_cuts.txt)
        
        cat > payload.json << EOF
        {
          "contents": [{
            "parts": [
              {"text": "Analisis video pendek 60 detik dari serial VIKINGS Season 1 Episode 1 (segment ke-$USED_COUNT). Berdasarkan 3 frame yang diberikan:\n\nBUAT KONTEN VIRAL UNTUK FACEBOOK dengan format:\n\n1. JUDUL: Judul EPIC, menarik, pakai kata ajakan (max 60 karakter)\n2. DESKRIPSI: 2-3 kalimat yang engaging, ajak LIKE, COMMENT, SHARE\n3. CAPTION: Caption dengan hook, emoji, call to action, dan 10-15 hashtag relevan (campuran trending + niche)\n4. PERTANYAAN: 1 pertanyaan yang memancing diskusi di kolom komen\n\nFORMAT JAWABAN (HARUS DIIKUTI):\nJUDUL: [judul]\nDESKRIPSI: [deskripsi]\nCAPTION: [caption dengan hashtag]\nPERTANYAAN: [pertanyaan]"},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME1_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME2_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME3_B64}"}}
            ]
          }],
          "generationConfig": {
            "temperature": 0.95,
            "maxOutputTokens": 500
          }
        }
        EOF
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d @payload.json > caption.json
        
        FULL_TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' caption.json)
        echo "=== GEMINI RESPONSE ==="
        echo "$FULL_TEXT"
        echo "======================="
        
        # Parse dengan regex yang lebih cerdas
        TITLE=$(echo "$FULL_TEXT" | grep -i "^JUDUL:" | head -1 | sed 's/^JUDUL:\s*//i' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        DESCRIPTION=$(echo "$FULL_TEXT" | grep -i "^DESKRIPSI:" | head -1 | sed 's/^DESKRIPSI:\s*//i' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        CAPTION=$(echo "$FULL_TEXT" | grep -i "^CAPTION:" | head -1 | sed 's/^CAPTION:\s*//i' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        QUESTION=$(echo "$FULL_TEXT" | grep -i "^PERTANYAAN:" | head -1 | sed 's/^PERTANYAAN:\s*//i' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        
        # Fallback jika kosong
        if [[ -z "$TITLE" ]]; then
          TITLE="⚔️ VIKINGS - Pertempuran Epic! LIKE & SHARE!"
        fi
        
        if [[ -z "$DESCRIPTION" ]]; then
          DESCRIPTION="🔥 Aksi seru para Viking! Jangan lupa LIKE, COMMENT, dan SHARE video ini!"
        fi
        
        if [[ -z "$CAPTION" ]]; then
          CAPTION="🔥 EPIC VIKINGS MOMENT!\n\nSaksikan aksi seru para Viking di episode ini!\n\n👇👇👇\n\n#Vikings #VikingsSeries #Nordik #Pertempuran #SerialEpic #Drakkar #Warrior #VikingWarrior #SeriesKeren #Viral #FacebookReels #ViralVideo #EpicMoment #AksiEpic #KontenViral"
        fi
        
        if [[ -z "$QUESTION" ]]; then
          QUESTION="Menurut kalian, siapakah Viking terkuat dalam serial ini? Tulis di komen! ⚔️🔥"
        fi
        
        # Gabungkan semua jadi full caption
        FULL_CAPTION="${TITLE}\n\n${DESCRIPTION}\n\n${CAPTION}\n\n📢 ${QUESTION}\n\n👇 LIKE, COMMENT, SHARE ya! 🔥"
        
        echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        echo "FULL_CAPTION=$FULL_CAPTION" >> $GITHUB_OUTPUT
        echo "✅ Generated: $TITLE"

    - name: Upload to Facebook
      env:
        FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: "104884774466325"
        FULL_CAPTION: ${{ steps.caption.outputs.FULL_CAPTION }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import requests, os
        token = os.environ.get("FB_TOKEN", "")
        page_id = os.environ.get("FB_PAGE_ID", "")
        full_caption = os.environ.get("FULL_CAPTION", "")
        title = os.environ.get("TITLE", "")
        
        print(f"📤 Uploading: {title}")
        
        url = f"https://graph.facebook.com/v18.0/{page_id}/videos"
        with open("output.mp4", "rb") as video_file:
            response = requests.post(
                url,
                data={"description": full_caption, "title": title, "access_token": token},
                files={"source": video_file},
                timeout=120
            )
        result = response.json()
        
        if "id" in result:
            print(f"✅ Uploaded: {result['id']}")
        else:
            print(f"⚠️ Upload result: {result}")
        PYTHON_SCRIPT

    - name: Send Telegram notification
      if: always()
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
        FULL_CAPTION: ${{ steps.caption.outputs.FULL_CAPTION }}
      run: |
        USED_COUNT=$(wc -l < used_cuts.txt)
        MESSAGE="🔥 VIKINGS S1E1 - Upload #${USED_COUNT}\n📌 ${TITLE}\n\n💬 Ajakan: LIKE, COMMENT, SHARE!\n📊 Total uploads: ${USED_COUNT}"
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="$MESSAGE" > /dev/null

    - name: Save used cuts
      if: always()
      uses: actions/cache/save@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
