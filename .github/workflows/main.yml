name: Facebook Auto Upload & Engagement

on:
  schedule:
    - cron: '0 23 * * *'   # Upload jam 07:00 WIB
    - cron: '0 10 * * *'   # Upload jam 17:30 WIB
    - cron: '*/15 * * * *' # Auto reply setiap 15 menit
  workflow_dispatch:

jobs:
  # ==================== JOB 1: AUTO UPLOAD ====================
  auto-upload:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.schedule == '0 23 * * *' || github.event.schedule == '0 10 * * *'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg jq
        pip install gdown requests

    - name: Restore used cuts
      uses: actions/cache@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable
        restore-keys: |
          fb-used-cuts-

    - name: Download video from Google Drive
      run: |
        echo "📥 Downloading Vikings S1E1..."
        gdown "https://drive.google.com/uc?id=1GXi0sXcYcSe6GjGr76Y2cf9eqQyZ_MbD" -O source_video.mp4 --fuzzy --quiet
        echo "✅ Download completed"

    - name: Get video duration
      id: duration
      run: |
        DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 source_video.mp4 | cut -d. -f1)
        echo "duration=$DURATION" >> $GITHUB_OUTPUT
        echo "🎬 Video duration: $DURATION seconds"

    - name: Find unused cut position
      id: cut
      run: |
        DURATION=${{ steps.duration.outputs.duration }}
        MAX_START=$((DURATION - 60))
        
        touch used_cuts.txt
        USED_COUNT=$(wc -l < used_cuts.txt)
        echo "📊 Used cuts so far: $USED_COUNT"
        
        while true; do
          START_TIME=$((RANDOM % MAX_START))
          if ! grep -q "^$START_TIME$" used_cuts.txt; then
            echo "$START_TIME" >> used_cuts.txt
            break
          fi
        done
        
        START_FORMATTED=$(printf "%02d:%02d:%02d" $((START_TIME/3600)) $(((START_TIME%3600)/60)) $((START_TIME%60)))
        echo "✂️ Cutting at $START_FORMATTED (unique position)"
        
        ffmpeg -i source_video.mp4 -ss "$START_FORMATTED" -t 60 \
          -c:v libx264 -c:a aac -preset fast -y output.mp4 2>/dev/null
        
        echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
        echo "✅ Cut completed"

    - name: Extract frames for analysis
      run: |
        ffmpeg -i output.mp4 -ss 5 -vframes 1 -y frame1.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 20 -vframes 1 -y frame2.jpg 2>/dev/null
        ffmpeg -i output.mp4 -ss 40 -vframes 1 -y frame3.jpg 2>/dev/null
        echo "🖼️ Frames extracted"

    - name: Generate engaging content with Gemini
      id: caption
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        FRAME1_B64=$(base64 -w 0 frame1.jpg)
        FRAME2_B64=$(base64 -w 0 frame2.jpg)
        FRAME3_B64=$(base64 -w 0 frame3.jpg)
        
        USED_COUNT=$(wc -l < used_cuts.txt)
        START_TIME=${{ steps.cut.outputs.start_time }}
        TIMESTAMP=$(printf "%02d:%02d" $((START_TIME/60)) $((START_TIME%60)))
        
        cat > payload.json << EOF
        {
          "contents": [{
            "parts": [
              {"text": "Analisis video pendek 60 detik dari serial VIKINGS Season 1 Episode 1 (segment ke-$USED_COUNT, timestamp $TIMESTAMP). Berdasarkan 3 frame:\n\nBUAT KONTEN VIRAL FACEBOOK:\n1. JUDUL: Epic, spesifik adegan, max 60 karakter, pakai ajakan LIKE & SHARE\n2. DESKRIPSI: 2-3 kalimat engaging, ajak LIKE, COMMENT, SHARE\n3. CAPTION: Hook + emoji + 10-15 hashtag\n4. PERTANYAAN: 1 pertanyaan pancing diskusi\n\nFORMAT:\nJUDUL: ...\nDESKRIPSI: ...\nCAPTION: ...\nPERTANYAAN: ..."},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME1_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME2_B64}"}},
              {"inline_data": {"mime_type": "image/jpeg", "data": "${FRAME3_B64}"}}
            ]
          }],
          "generationConfig": {"temperature": 0.95, "maxOutputTokens": 500}
        }
        EOF
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d @payload.json > caption.json
        
        FULL_TEXT=$(jq -r '.candidates[0].content.parts[0].text // ""' caption.json)
        
        TITLE=$(echo "$FULL_TEXT" | grep -i "^JUDUL:" | head -1 | sed 's/^JUDUL:\s*//i')
        DESCRIPTION=$(echo "$FULL_TEXT" | grep -i "^DESKRIPSI:" | head -1 | sed 's/^DESKRIPSI:\s*//i')
        CAPTION=$(echo "$FULL_TEXT" | grep -i "^CAPTION:" | head -1 | sed 's/^CAPTION:\s*//i')
        QUESTION=$(echo "$FULL_TEXT" | grep -i "^PERTANYAAN:" | head -1 | sed 's/^PERTANYAAN:\s*//i')
        
        if [[ -z "$TITLE" ]]; then
          TITLE="⚔️ VIKINGS - Adegan EPIC di Menit ${TIMESTAMP}! LIKE & SHARE!"
        fi
        if [[ -z "$DESCRIPTION" ]]; then
          DESCRIPTION="🔥 Aksi seru para Viking! Jangan lupa LIKE, COMMENT, SHARE!"
        fi
        if [[ -z "$CAPTION" ]]; then
          CAPTION="🔥 EPIC VIKINGS MOMENT!\n\nSaksikan aksi seru para Viking!\n\n#Vikings #VikingsSeries #Nordik #Pertempuran #SerialEpic #Drakkar #Warrior"
        fi
        if [[ -z "$QUESTION" ]]; then
          QUESTION="Menurut kalian, siapakah Viking terkuat? Tulis di komen! ⚔️🔥"
        fi
        
        FULL_CAPTION="${TITLE}\n\n${DESCRIPTION}\n\n${CAPTION}\n\n📢 ${QUESTION}\n\n👇 LIKE, COMMENT, SHARE ya! 🔥"
        
        echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        echo "FULL_CAPTION=$FULL_CAPTION" >> $GITHUB_OUTPUT
        echo "✅ Generated: $TITLE"

    - name: Upload to Facebook
      env:
        FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        FB_PAGE_ID: "104884774466325"
        FULL_CAPTION: ${{ steps.caption.outputs.FULL_CAPTION }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import requests, os
        token = os.environ.get("FB_TOKEN", "")
        page_id = os.environ.get("FB_PAGE_ID", "")
        full_caption = os.environ.get("FULL_CAPTION", "")
        title = os.environ.get("TITLE", "")
        
        full_caption = full_caption.replace('\\n\\n', '\n\n').replace('\\n', '\n')
        
        url = f"https://graph.facebook.com/v18.0/{page_id}/videos"
        with open("output.mp4", "rb") as video_file:
            response = requests.post(
                url,
                data={"description": full_caption, "title": title, "access_token": token},
                files={"source": video_file},
                timeout=120
            )
        result = response.json()
        
        if "id" in result:
            print(f"✅ Uploaded: {result['id']}")
            # Simpan post_id untuk auto engagement
            with open("last_post_id.txt", "w") as f:
                f.write(result['id'])
        else:
            print(f"⚠️ Error: {result}")
        PYTHON_SCRIPT

    - name: Save last post ID
      uses: actions/cache/save@v4
      with:
        path: last_post_id.txt
        key: last-post-id

    - name: Send Telegram notification
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TITLE: ${{ steps.caption.outputs.TITLE }}
      run: |
        USED_COUNT=$(wc -l < used_cuts.txt)
        curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
          -d chat_id="${CHAT_ID}" \
          -d text="<b>🔥 VIKINGS Upload #${USED_COUNT}</b>%0A%0A📌 <i>${TITLE}</i>%0A%0a💬 LIKE, COMMENT, SHARE!%0A📊 Total: ${USED_COUNT}" \
          -d parse_mode="HTML"

    - name: Save used cuts
      if: always()
      uses: actions/cache/save@v4
      with:
        path: used_cuts.txt
        key: fb-used-cuts-stable


  # ==================== JOB 2: AUTO ENGAGEMENT (LIKE + KOMEN) ====================
  auto-engagement:
    runs-on: ubuntu-latest
    needs: auto-upload
    if: always() && github.event_name != 'schedule'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore last post ID
      uses: actions/cache/restore@v4
      with:
        path: last_post_id.txt
        key: last-post-id
        fail-on-cache-miss: false

    - name: Auto Like & Comment from Dummy Account
      env:
        FB_DUMMY_TOKEN: ${{ secrets.FB_DUMMY_TOKEN }}
        FB_DUMMY_USER_ID: ${{ secrets.FB_DUMMY_USER_ID }}
      run: |
        # List komentar variasi
        COMMENTS=(
          "⚔️ Viking terbaik! Like for more epic content! 🔥"
          "🛡️ Ragnar would be proud! Share this! 💪"
          "🌊 Another epic moment from Vikings! Like & share!"
          "👑 Best scene ever! Who agrees? 👇"
          "🔥 More Vikings content please! Like this comment!"
          "⚔️ Skål! This is why Vikings is the best series! 🍻"
          "💀 Brutal! Like if you love Vikings! 🛡️"
          "🏆 Epic! Who else watches this on repeat? 🔥"
          "🌊 Valhalla awaits! Like for more! ⚔️"
          "👑 King Ragnar approves this post! Like! 🔥"
        )
        
        # Ambil random komentar
        RANDOM_INDEX=$((RANDOM % ${#COMMENTS[@]}))
        RANDOM_COMMENT="${COMMENTS[$RANDOM_INDEX]}"
        
        # Baca post_id terakhir
        if [ -f "last_post_id.txt" ]; then
          POST_ID=$(cat last_post_id.txt)
          
          # Like postingan
          echo "👍 Liking post: $POST_ID"
          curl -s -X POST "https://graph.facebook.com/v18.0/${POST_ID}/likes?access_token=${FB_DUMMY_TOKEN}" > /dev/null
          
          # Jeda biar gak kena spam detection
          sleep 5
          
          # Komentar
          echo "💬 Commenting: $RANDOM_COMMENT"
          curl -s -X POST "https://graph.facebook.com/v18.0/${POST_ID}/comments" \
            -d "message=${RANDOM_COMMENT}" \
            -d "access_token=${FB_DUMMY_TOKEN}" > /dev/null
          
          echo "✅ Auto engagement completed!"
        else
          echo "⚠️ No post ID found, skipping auto engagement"
        fi

  # ==================== JOB 3: AUTO REPLY AI ====================
  auto-reply:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore last post ID
      uses: actions/cache/restore@v4
      with:
        path: last_post_id.txt
        key: last-post-id
        fail-on-cache-miss: false

    - name: Get latest comments
      env:
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
      run: |
        if [ ! -f "last_post_id.txt" ]; then
          echo "⚠️ No post ID found, skipping"
          exit 0
        fi
        
        POST_ID=$(cat last_post_id.txt)
        
        # Ambil komen terbaru
        curl -s -X GET "https://graph.facebook.com/v18.0/${POST_ID}/comments?access_token=${FB_PAGE_TOKEN}&order=reverse_chronological&limit=10" > comments.json
        
        # Simpan komen yang belum dibalas (untuk diproses nanti)
        # Note: Ini perlu tracking reply history, untuk sekarang skip dulu
        echo "📝 Found $(jq '.data | length' comments.json) comments"
        
        # Untuk demo, kita ambil komen pertama
        FIRST_COMMENT=$(jq -r '.data[0].id // ""' comments.json)
        FIRST_MESSAGE=$(jq -r '.data[0].message // ""' comments.json)
        
        if [ -n "$FIRST_COMMENT" ] && [ "$FIRST_MESSAGE" != "null" ]; then
          echo "FIRST_COMMENT=$FIRST_COMMENT" >> $GITHUB_OUTPUT
          echo "FIRST_MESSAGE=$FIRST_MESSAGE" >> $GITHUB_OUTPUT
        fi

    - name: Generate AI reply with Gemini
      if: steps.comments.outputs.FIRST_COMMENT != ''
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        COMMENT="${{ steps.comments.outputs.FIRST_MESSAGE }}"
        
        curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-pro:generateContent?key=${GEMINI_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts": [{
                "text": "Balas komen Facebook ini dengan ramah, singkat, engaging, dan gunakan emoji yang sesuai. Komen: '"${COMMENT}"'"
              }]
            }],
            "generationConfig": {"temperature": 0.8, "maxOutputTokens": 100}
          }' > reply.json
        
        REPLY=$(jq -r '.candidates[0].content.parts[0].text // ""' reply.json)
        echo "REPLY=$REPLY" >> $GITHUB_OUTPUT

    - name: Post reply
      if: steps.reply.outputs.REPLY != ''
      env:
        FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
      run: |
        COMMENT_ID="${{ steps.comments.outputs.FIRST_COMMENT }}"
        REPLY="${{ steps.reply.outputs.REPLY }}"
        
        curl -s -X POST "https://graph.facebook.com/v18.0/${COMMENT_ID}/comments" \
          -d "message=${REPLY}" \
          -d "access_token=${FB_PAGE_TOKEN}" > /dev/null
        
        echo "✅ Replied to comment: $REPLY"
